<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100vh; overflow: hidden; }
    iframe { 
      width: 100%; 
      height: 100vh !important; 
      border: none; 
      display: block; 
    }
  </style>
</head>
<body>
  <iframe src="sample-pdf.pdf#toolbar=0&navpanes=0&scrollbar=0" frameborder="0" allowfullscreen>
    <p><a href="sample-pdf.pdf">Download PDF</a></p>
  </iframe>
</body>
</html>
